<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelador Cívico — Auditoria Territorial</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Syne:wght@700&family=Bebas+Neue&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { 
            --bg: #f5f2ec; --accent: #1a3a5c; --muted: #8a8478; --white: #ffffff;
            --azul: #003f6b; --ouro: #FFD700; --ouro-alaranjado: #FFB800;
            --vermelho: #d32f2f; --cinza2: #dde1e7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--accent); font-family: 'Barlow', sans-serif; min-height: 100vh; }

        /* PORTAL DE ENTRADA */
        #portal-entrada { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .portal-card { text-align: center; max-width: 550px; width: 100%; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--cinza2); }
        .portal-card h1 { font-family: 'DM Serif Display', serif; font-size: 42px; color: var(--accent); margin-bottom: 10px; }
        
        /* LEMA AMPLIADO E CORRIGIDO */
        .lema-destaque { 
            background: #000; color: var(--ouro-alaranjado); font-family: 'Syne', sans-serif; 
            font-size: 20px; font-weight: 700; text-transform: uppercase; padding: 20px; 
            border-radius: 10px; margin: 20px 0 30px; border: 2px solid var(--ouro-alaranjado);
            display: block; width: 100%; line-height: 1.2;
        }

        .input-group { display: flex; border: 2px solid var(--accent); border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
        .input-group input { flex: 1; border: none; padding: 18px; font-family: 'DM Mono'; font-size: 20px; outline: none; }
        .btn-entrar { background: var(--accent); color: white; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; }

        /* SISTEMA */
        #sistema-auditoria { display: none; }
        header { background: var(--azul); color: var(--white); padding: 15px; text-align: center; }
        
        .tabs { display: flex; background: #000000; border-bottom: 1px solid var(--ouro); position: sticky; top: 0; z-index: 1000; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-family: 'Syne'; font-weight: 700; color: #ffffff; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .tab-btn.active { color: var(--ouro); border-bottom: 3px solid var(--ouro); background: #1a1a1a; }
        
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }

        #map { height: 400px; border-radius: 10px; border: 1px solid var(--cinza2); margin-bottom: 15px; }

        /* RADAR ICON */
        .radar-icon { width: 18px; height: 18px; background: var(--vermelho); border-radius: 50%; border: 2px solid white; position: relative; }
        .radar-icon::after { content: ''; position: absolute; width: 100%; height: 100%; background: var(--vermelho); border-radius: 50%; animation: pulse-radar 1.2s infinite; opacity: 0.5; top: 0; left: 0; }
        @keyframes pulse-radar { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(3.5); opacity: 0; } }

        .card-invest { background: white; padding: 20px; border-radius: 10px; border: 1px solid var(--cinza2); margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="portal-entrada">
    <div class="portal-card">
        <h1>Zelador Cívico</h1>
        <div class="lema-destaque">Transformando visão em poder</div>
        <div class="input-group">
            <input type="text" id="cep-input" placeholder="00000-000" maxlength="9">
            <button class="btn-entrar" onclick="acessarComCep()">OK</button>
        </div>
    </div>
</div>

<div id="sistema-auditoria">
    <header><h2 style="font-family: 'Bebas Neue'; color: var(--ouro); letter-spacing: 2px;">⚖ ZELADOR CÍVICO</h2></header>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="mudarAba('radar', this)">RADAR</button>
        <button class="tab-btn" onclick="mudarAba('investimento', this)">INVESTIMENTO</button>
    </div>

    <div id="tab-radar" class="tab-content active">
        <div id="map"></div>
    </div>

    <div id="tab-investimento" class="tab-content">
        <div class="card-invest">
            <h3 style="font-family: 'Syne'; margin-bottom: 10px;">MÓDULO DE INVESTIMENTOS</h3>
            <p style="font-family: 'DM Mono'; font-size: 14px; color: var(--muted);">Aguardando dados de emendas...</p>
        </div>
    </div>
</div>

<script>
    var mapa = null;
    var markersLayer = L.layerGroup();

    function mudarAba(id, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + id).classList.add('active');
        if(id === 'radar' && mapa) {
            setTimeout(() => { mapa.invalidateSize(); }, 200);
        }
    }

    function acessarComCep() {
        const cep = document.getElementById('cep-input').value.replace(/\D/g, '');
        if(cep.length === 8) {
            document.getElementById('portal-entrada').style.display = 'none';
            document.getElementById('sistema-auditoria').style.display = 'block';
            initMapa(cep);
        } else {
            alert("CEP Inválido");
        }
    }

    function initMapa(cep) {
        if (!mapa) {
            mapa = L.map('map').setView([-23.55, -46.63], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
            markersLayer.addTo(mapa);
        }

        fetch(`https://viacep.com.br/ws/${cep}/json/`)
            .then(r => r.json())
            .then(d => {
                const endereco = (d.logradouro || d.bairro) + ", São Paulo";
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}`)
                    .then(r => r.json())
                    .then(g => {
                        if(g[0]) {
                            const lat = parseFloat(g[0].lat);
                            const lon = parseFloat(g[0].lon);
                            mapa.setView([lat, lon], 16);
                            L.marker([lat, lon]).addTo(mapa).bindPopup("Você está aqui").openPopup();
                            
                            // Adiciona um ponto de radar simulado
                            const icon = L.divIcon({ className: '', html: '<div class="radar-icon"></div>', iconSize: [18, 18] });
                            L.marker([lat + 0.002, lon + 0.002], { icon: icon }).addTo(markersLayer);
                        }
                    });
            });
    }

    // Máscara CEP
    document.getElementById('cep-input').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 5) v = v.substring(0, 5) + '-' + v.substring(5, 8);
        e.target.value = v;
    });
</script>
</body>
</html>
