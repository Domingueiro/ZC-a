<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelador Cívico — Auditoria Territorial</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Syne:wght@700&family=Bebas+Neue&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { 
            --bg: #f5f2ec; --accent: #1a3a5c; --muted: #8a8478; --white: #ffffff;
            --azul: #003f6b; --ouro: #FFD700; --ouro-alaranjado: #FFB800;
            --vermelho: #d32f2f; --cinza2: #dde1e7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--accent); font-family: 'Barlow', sans-serif; min-height: 100vh; }

        /* --- PORTAL DE ENTRADA (AJUSTADO PARA O NOVO LEMA) --- */
        #portal-entrada { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .portal-card { text-align: center; max-width: 600px; width: 100%; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--cinza2); }
        
        .portal-card h1 { font-family: 'DM Serif Display', serif; font-size: 48px; color: var(--accent); margin-bottom: 15px; }
        
        /* AJUSTE NO LEMA: Aumentado para caber "Transformando visão em poder" */
        .lema-destaque { 
            background: #000; 
            color: var(--ouro-alaranjado); 
            font-family: 'Syne', sans-serif; 
            font-size: clamp(18px, 4vw, 24px); /* Tamanho adaptável */
            font-weight: 700; 
            text-transform: uppercase; 
            padding: 20px; 
            border-radius: 12px; 
            margin: 20px 0 35px; 
            border: 2px solid var(--ouro-alaranjado);
            line-height: 1.2;
            width: 100%;
            display: block;
        }

        .input-group { display: flex; border: 2px solid var(--accent); border-radius: 10px; overflow: hidden; margin-bottom: 15px; background: white; }
        .input-group input { flex: 1; border: none; padding: 18px; font-family: 'DM Mono'; font-size: 22px; outline: none; width: 100%; }
        .btn-entrar { background: var(--accent); color: white; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; }
        .btn-geo { width: 100%; padding: 15px; border: 2px solid var(--accent); border-radius: 10px; background: white; font-family: 'Syne'; font-weight: 700; cursor: pointer; text-transform: uppercase; }

        /* --- RESTANTE DO SISTEMA --- */
        #sistema-auditoria { display: none; }
        header { background: var(--azul); color: var(--white); padding: 15px; text-align: center; }
        
        .tabs { display: flex; background: #000000; border-bottom: 1px solid var(--ouro); position: sticky; top: 0; z-index: 1000; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-family: 'Syne'; font-weight: 700; color: #ffffff; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
        .tab-btn.active { color: var(--ouro); border-bottom: 3px solid var(--ouro); background: #1a1a1a; }
        
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }

        #map-container { position: relative; margin-bottom: 15px; }
        #map { height: 380px; border-radius: 10px; border: 1px solid var(--cinza2); z-index: 1; }
        
        .map-legend { 
            position: absolute; top: 10px; right: 10px; z-index: 1000; 
            background: rgba(0,0,0,0.8); color: #fff; padding: 8px 12px; 
            border-radius: 5px; font-size: 11px; max-width: 150px; 
            border: 1px solid var(--ouro); pointer-events: none;
            font-family: 'DM Mono', monospace;
        }

        /* RADAR ICON */
        .radar-icon { width: 18px; height: 18px; background: var(--vermelho); border-radius: 50%; border: 2px solid white; position: relative; }
        .radar-icon::after { content: ''; position: absolute; width: 100%; height: 100%; background: var(--vermelho); border-radius: 50%; animation: pulse-radar 1.2s infinite; opacity: 0.5; top: 0; left: 0; }
        @keyframes pulse-radar { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(3.5); opacity: 0; } }
    </style>
</head>
<body>

<div id="portal-entrada">
    <div class="portal-card">
        <h1>Zelador Cívico</h1>
        <div class="lema-destaque">Transformando visão em poder</div>
        
        <div class="input-group">
            <input type="text" id="cep-input" placeholder="00000-000" maxlength="9" inputmode="numeric">
            <button class="btn-entrar" onclick="acessarComCep()">OK</button>
        </div>
        <button class="btn-geo" onclick="acessarComGeo()">📍 USAR LOCALIZAÇÃO</button>
    </div>
</div>

<div id="sistema-auditoria">
    <header><h2 style="font-family: 'Bebas Neue'; color: var(--ouro); letter-spacing: 2px;">⚖ ZELADOR CÍVICO</h2></header>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="mudarAba('radar', this)">RADAR</button>
        <button class="tab-btn" onclick="mudarAba('alertas', this)">ALERTAS</button>
        <button class="tab-btn" onclick="mudarAba('investimento', this)">INVESTIMENTO</button>
    </div>

    </div>

<script>
    // Lógica de CEP e inicialização mantida...
    function acessarComCep() {
        const val = document.getElementById('cep-input').value.replace(/\D/g, '');
        if(val.length === 8) {
            document.getElementById('portal-entrada').style.display = 'none';
            document.getElementById('sistema-auditoria').style.display = 'block';
            // Restante da inicialização...
        }
    }
</script>
</body>
</html>
