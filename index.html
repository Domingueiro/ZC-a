<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelador Cívico · Portal de Acesso</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #f5f2ec; 
            --accent: #1a3a5c; 
            --yellow: #f5c842; 
            --muted: #8a8478; 
            --white: #ffffff;
        }

        * { box-sizing: border-box; }

        body { 
            background: var(--bg); 
            color: var(--accent); 
            font-family: 'Syne', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }

        .portal-card { 
            text-align: center; 
            max-width: 450px; 
            width: 100%;
            padding: 40px; 
            background: rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(26, 58, 92, 0.05);
        }

        h1 { 
            font-family: 'DM Serif Display', serif; 
            font-size: 48px; 
            margin: 0 0 10px 0; 
            line-height: 1;
        }

        .subtitle { 
            font-family: 'DM Mono', monospace; 
            font-size: 12px; 
            color: var(--muted); 
            margin-bottom: 40px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* CONTAINER DE ENTRADA (Mecânica de Identificação) */
        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .input-group { 
            display: flex; 
            align-items: center; 
            background: var(--white); 
            border: 2px solid var(--accent); 
            border-radius: 12px; 
            padding: 5px 15px; 
            transition: transform 0.2s;
        }

        .input-group:focus-within {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(26, 58, 92, 0.1);
        }
        
        #cep-input { 
            border: none; 
            outline: none; 
            font-family: 'DM Mono', monospace; 
            font-size: 20px; 
            width: 100%; 
            color: var(--accent); 
            padding: 10px 0;
        }

        /* BOTÃO DE GEOLOCALIZAÇÃO */
        .geo-btn { 
            background: none; 
            border: none; 
            cursor: pointer; 
            padding: 10px; 
            border-left: 1px solid #eee; 
            margin-left: 10px; 
            display: flex; 
            align-items: center; 
            transition: 0.2s; 
        }
        
        .geo-btn:hover { 
            background: #f0f7ff;
            border-radius: 0 8px 8px 0;
        }
        
        .geo-btn svg { 
            fill: var(--accent); 
            width: 24px; 
            height: 24px; 
        }

        /* BOTÃO PRINCIPAL DE ACESSO */
        .main-btn { 
            width: 100%; 
            padding: 18px; 
            background: var(--accent); 
            color: var(--white); 
            border: none; 
            border-radius: 12px; 
            font-family: 'Syne', sans-serif;
            font-weight: 700; 
            cursor: pointer; 
            font-size: 16px; 
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .main-btn:hover { 
            background: #2a4a6c; 
            box-shadow: 0 5px 15px rgba(26, 58, 92, 0.2);
        }

        .footer-note {
            margin-top: 30px;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
        }
    </style>
</head>
<body>

<div class="portal-card">
    <h1>Zelador Cívico</h1>
    <div class="subtitle">Auditoria de Arrecadação vs. Investimento</div>

    <div class="input-wrapper">
        <div class="input-group">
            <input type="text" id="cep-input" placeholder="00000-000" maxlength="9" inputmode="numeric">
            <button class="geo-btn" title="Usar localização do smartphone" onclick="usarGeo()">
                <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-12-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            </button>
        </div>

        <button class="main-btn" onclick="acessar()">
            Acessar Dados Regionais
            <span>→</span>
        </button>
    </div>

    <div class="footer-note">
        SÃO PAULO · CONTROLE SOCIAL · PAZ PROFUNDA
    </div>
</div>

<script>
    // MÁSCARA DE CEP AUTOMÁTICA
    document.getElementById('cep-input').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g,'');
        if(v.length > 5) v = v.slice(0,5) + '-' + v.slice(5,8);
        e.target.value = v;
    });

    // FUNÇÃO PARA ACESSAR VIA CEP
    function acessar() {
        const cepRaw = document.getElementById('cep-input').value;
        const cepFormatado = cepRaw.replace(/\D/g,'');
        
        if(cepFormatado.length === 8) {
            // Redireciona para o módulo Zelador passando o CEP na URL
            window.location.href = `zelador.html?cep=${cepFormatado}`;
        } else {
            alert("Por favor, insira um CEP válido de 8 dígitos.");
        }
    }

    // FUNÇÃO PARA USAR GEOLOCALIZAÇÃO
    function usarGeo() {
        if ("geolocation" in navigator) {
            const btn = document.querySelector('.main-btn');
            btn.innerHTML = "Localizando...";
            btn.disabled = true;

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    // Redireciona passando as coordenadas
                    window.location.href = `zelador.html?lat=${lat}&lon=${lon}`;
                },
                (error) => {
                    alert("Erro ao obter localização. Por favor, digite o CEP.");
                    btn.innerHTML = "Acessar Dados Regionais →";
                    btn.disabled = false;
                }
            );
        } else {
            alert("Geolocalização não disponível neste navegador.");
        }
    }

    // ACESSO AO PRESSIONAR ENTER
    document.getElementById('cep-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            acessar();
        }
    });
</script>

</body>
</html>
