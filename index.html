<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zelador Cívico · Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet">
<style>
  :root { --bg: #f5f2ec; --accent: #1a3a5c; --yellow: #f5c842; --muted: #8a8478; }
  body { background: var(--bg); color: var(--accent); font-family: 'Syne', sans-serif; 
         display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }

  .portal-card { text-align: center; max-width: 450px; padding: 40px; }
  h1 { font-family: 'DM Serif Display', serif; font-size: 42px; margin-bottom: 10px; }
  p { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); margin-bottom: 40px; }

  /* CONTAINER DE ENTRADA */
  .input-group { display: flex; align-items: center; background: white; border: 2px solid var(--accent); 
                  border-radius: 8px; padding: 8px 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
  
  #cep-input { border: none; outline: none; font-family: 'DM Mono', monospace; font-size: 18px; width: 140px; color: var(--accent); }
  
  .geo-btn { background: none; border: none; cursor: pointer; padding: 10px; border-left: 1px solid #eee; 
             margin-left: 10px; display: flex; align-items: center; transition: 0.2s; }
  .geo-btn:hover { transform: scale(1.1); }
  .geo-btn svg { fill: var(--accent); width: 24px; height: 24px; }

  .main-btn { margin-top: 25px; width: 100%; padding: 16px; background: var(--accent); color: white; 
              border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
</style>
</head>
<body>

<div class="portal-card">
  <h1>Zelador Cívico</h1>
  <p>Auditoria participativa da cidade de São Paulo.</p>

  <div class="input-group">
    <input type="text" id="cep-input" placeholder="00000-000" maxlength="9">
    <button class="geo-btn" title="Usar localização do smartphone" onclick="usarGeo()">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-12-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    </button>
  </div>

  <button class="main-btn" onclick="acessar()">Entrar no Ecossistema →</button>
</div>

<script>
  function acessar() {
    const cep = document.getElementById('cep-input').value;
    if(cep.length >= 8) {
      // Aqui o Supervisor redireciona para a ferramenta principal passando o CEP
      window.location.href = `zelador.html?cep=${cep.replace(/\D/g,'')}`;
    } else {
      alert("Por favor, insira um CEP válido.");
    }
  }

  function usarGeo() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition((pos) => {
        alert("Localização capturada! Redirecionando...");
        window.location.href = "zelador.html?geo=true";
      });
    } else {
      alert("Geolocalização não suportada neste aparelho.");
    }
  }

  // Máscara de CEP
  document.getElementById('cep-input').addEventListener('input', e => {
    let v = e.target.value.replace(/\D/g,'');
    if(v.length > 5) v = v.slice(0,5) + '-' + v.slice(5,8);
    e.target.value = v;
  });
</script>

</body>
</html>
