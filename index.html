<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelador Cívico — Auditoria Territorial</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Syne:wght@700&family=Bebas+Neue&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { 
            --bg: #f5f2ec; --accent: #1a3a5c; --muted: #8a8478; --white: #ffffff;
            --azul: #003f6b; --ouro: #FFD700; --ouro-alaranjado: #FFB800;
            --vermelho: #d32f2f; --cinza2: #dde1e7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--accent); font-family: 'Barlow', sans-serif; min-height: 100vh; overflow-x: hidden; }

        /* --- PORTAL DE ENTRADA --- */
        #portal-entrada { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .portal-card { text-align: center; max-width: 550px; width: 100%; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--cinza2); }
        .portal-card h1 { font-family: 'DM Serif Display', serif; font-size: 42px; color: var(--accent); margin-bottom: 10px; }
        
        .lema-destaque { 
            background: #000; color: var(--ouro-alaranjado); font-family: 'Syne', sans-serif; 
            font-size: clamp(16px, 4.5vw, 22px); font-weight: 700; text-transform: uppercase; 
            padding: 22px; border-radius: 12px; margin: 20px 0 25px; border: 2px solid var(--ouro-alaranjado);
            display: block; width: 100%; line-height: 1.3;
        }

        .input-group { display: flex; border: 2px solid var(--accent); border-radius: 10px; overflow: hidden; background: white; margin-bottom: 15px; }
        .input-group input { flex: 1; border: none; padding: 18px; font-family: 'DM Mono'; font-size: 20px; outline: none; width: 100%; }
        .btn-entrar { background: var(--accent); color: white; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; font-size: 18px; }

        .divisor { margin: 15px 0; font-family: 'DM Mono'; color: var(--muted); font-weight: bold; font-size: 14px; text-transform: uppercase; }

        .btn-geo { 
            width: 100%; padding: 16px; border: 2px solid var(--accent); border-radius: 10px; 
            background: white; font-family: 'Syne'; font-weight: 700; cursor: pointer; 
            text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* --- SISTEMA PRINCIPAL --- */
        #sistema-auditoria { display: none; }
        header { background: var(--azul); color: var(--white); padding: 15px; text-align: center; border-bottom: 4px solid var(--ouro); }
        
        .tabs { display: flex; background: #000000; position: sticky; top: 0; z-index: 1000; }
        .tab-btn { flex: 1; padding: 18px 10px; border: none; background: none; font-family: 'Syne'; font-weight: 700; color: #ffffff; cursor: pointer; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        .tab-btn.active { color: var(--ouro); border-bottom: 4px solid var(--ouro); background: #1a1a1a; }
        
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #map { height: 450px; border-radius: 15px; border: 2px solid var(--accent); background: #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* --- RADAR DE ANOMALIAS (PONTOS PULSANTES) --- */
        .radar-icon { width: 16px; height: 16px; background: var(--vermelho); border-radius: 50%; border: 2px solid white; position: relative; }
        .radar-icon::after { 
            content: ''; position: absolute; width: 100%; height: 100%; background: var(--vermelho); 
            border-radius: 50%; animation: pulse-radar 1.5s infinite; opacity: 0.6; top: 0; left: 0; 
        }
        @keyframes pulse-radar { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(4); opacity: 0; } }

        .info-box { background: white; padding: 15px; border-radius: 10px; border-left: 5px solid var(--ouro); margin-top: 15px; font-family: 'Barlow'; }
    </style>
</head>
<body>

<div id="portal-entrada">
    <div class="portal-card">
        <h1>Zelador Cívico</h1>
        <div class="lema-destaque">Transformando visão em poder</div>
        
        <div class="input-group">
            <input type="text" id="cep-input" placeholder="00000-000" maxlength="9" inputmode="numeric">
            <button class="btn-entrar" onclick="acessarComCep()">OK</button>
        </div>

        <div class="divisor"> — OU — </div>

        <button class="btn-geo" onclick="acessarComGeo()">
            📍 USAR LOCALIZAÇÃO ATUAL
        </button>
    </div>
</div>

<div id="sistema-auditoria">
    <header>
        <h2 style="font-family: 'Bebas Neue'; color: var(--ouro); letter-spacing: 3px; font-size: 28px;">⚖ MONITORAMENTO TERRITORIAL</h2>
    </header>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="mudarAba('radar', this)">RADAR</button>
        <button class="tab-btn" onclick="mudarAba('alertas', this)">ALERTAS</button>
        <button class="tab-btn" onclick="mudarAba('investimento', this)">INVESTIMENTO</button>
    </div>

    <div id="tab-radar" class="tab-content active">
        <div id="map"></div>
        <div class="info-box">
            <strong>🔍 STATUS DO PERÍMETRO:</strong>
            <span id="status-perimetro">Toque em um ponto pulsante para auditar a anomalia.</span>
        </div>
    </div>

    <div id="tab-alertas" class="tab-content">
        <h3 style="font-family: 'Syne'; border-bottom: 2px solid var(--vermelho); padding-bottom: 10px;">ALERTAS CRÍTICOS</h3>
        <p style="margin-top:15px; font-family: 'DM Mono';">Nenhum desvio detectado nos últimos 30 dias.</p>
    </div>

    <div id="tab-investimento" class="tab-content">
        <h3 style="font-family: 'Syne'; border-bottom: 2px solid var(--azul); padding-bottom: 10px;">EMENDAS PARLAMENTARES</h3>
        <p style="margin-top:15px; font-family: 'DM Mono';">Módulo em fase de auditoria de dados.</p>
    </div>
</div>

<script>
    var mapa = null;
    var markersLayer = L.layerGroup();

    // MÁSCARA CEP
    document.getElementById('cep-input').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 5) v = v.substring(0, 5) + '-' + v.substring(5, 8);
        e.target.value = v;
    });

    function mudarAba(id, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + id).classList.add('active');
        if(id === 'radar' && mapa) {
            setTimeout(() => { mapa.invalidateSize(); }, 300);
        }
    }

    function acessarComCep() {
        const val = document.getElementById('cep-input').value.replace(/\D/g, '');
        if(val.length === 8) iniciarSistema(val);
        else alert("CEP incompleto.");
    }

    function acessarComGeo() {
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                () => iniciarSistema("01001000"), 
                () => alert("Erro ao acessar GPS.")
            );
        }
    }

    function iniciarSistema(cep) {
        document.getElementById('portal-entrada').style.display = 'none';
        document.getElementById('sistema-auditoria').style.display = 'block';
        
        if (!mapa) {
            mapa = L.map('map').setView([-23.55, -46.63], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
            markersLayer.addTo(mapa);
        }

        fetch(`https://viacep.com.br/ws/${cep}/json/`)
            .then(r => r.json())
            .then(d => {
                const endereco = (d.logradouro || d.bairro) + ", São Paulo";
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}`)
                    .then(r => r.json())
                    .then(g => {
                        if(g[0]) {
                            const lat = parseFloat(g[0].lat);
                            const lon = parseFloat(g[0].lon);
                            mapa.setView([lat, lon], 16);
                            
                            markersLayer.clearLayers();
                            
                            L.marker([lat, lon]).addTo(markersLayer).bindPopup("<b>Auditoria Ativa</b><br>"+d.logradouro).openPopup();
                            
                            document.getElementById('status-perimetro').innerText = "3 anomalias detectadas no entorno.";
                            
                            for (let i = 0; i < 3; i++) {
                                let rLat = lat + (Math.random() - 0.5) * 0.006;
                                let rLon = lon + (Math.random() - 0.5) * 0.006;
                                let pulseIcon = L.divIcon({ className: '', html: '<div class="radar-icon"></div>', iconSize: [16, 16] });
                                L.marker([rLat, rLon], { icon: pulseIcon }).addTo(markersLayer)
                                 .bindPopup(`<b>ALERTA DE LICITAÇÃO</b><br>Atraso na entrega detectado neste ponto.`);
                            }
                        }
                    });
            });
    }
</script>
</body>
</html>
