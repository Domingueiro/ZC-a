<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelador Cívico · Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #f5f2ec; 
            --accent: #1a3a5c; 
            --yellow: #f5c842; 
            --muted: #8a8478; 
            --white: #ffffff;
        }

        body { 
            background: var(--bg); 
            color: var(--accent); 
            font-family: 'Syne', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }

        .portal-card { 
            text-align: center; 
            max-width: 400px; 
            width: 100%;
            padding: 40px; 
            background: rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(26, 58, 92, 0.05);
        }

        h1 { font-family: 'DM Serif Display', serif; font-size: 42px; margin: 0 0 5px 0; }
        .subtitle { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 35px; text-transform: uppercase; letter-spacing: 1px; }

        .opcoes-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        /* OPÇÃO 1: CEP */
        .input-group {
            display: flex;
            align-items: center;
            background: var(--white);
            border: 2px solid var(--accent);
            border-radius: 12px;
            overflow: hidden;
        }

        .btn-trigger-cep {
            background: var(--accent);
            color: white;
            font-family: 'DM Mono', monospace;
            font-weight: bold;
            font-size: 14px;
            padding: 15px 20px;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        .btn-trigger-cep:hover { background: #2a4a6c; }

        #cep-input { 
            border: none; 
            outline: none; 
            font-family: 'DM Mono', monospace; 
            font-size: 20px; 
            width: 100%; 
            color: var(--accent);
            padding: 10px 15px;
            background: transparent;
        }

        /* DIVISOR VISUAL */
        .divisor {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            margin: 5px 0;
        }

        /* OPÇÃO 2: GEO (BOTÃO CHEIO) */
        .btn-geo-full {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--white);
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 12px;
            padding: 15px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-geo-full:hover { background: #f0f7ff; }
        .btn-geo-full svg { fill: var(--accent); width: 20px; height: 20px; }

        .footer-note { margin-top: 30px; font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); }
    </style>
</head>
<body>

<div class="portal-card">
    <h1>Zelador Cívico</h1>
    <div class="subtitle">Auditoria de Dados Urbanos</div>

    <div class="opcoes-container">
        <div class="input-group">
            <button class="btn-trigger-cep" onclick="acessar()">CEP</button>
            <input type="text" id="cep-input" placeholder="00000-000" maxlength="9" inputmode="numeric">
        </div>

        <div class="divisor">— OU —</div>

        <button class="btn-geo-full" onclick="usarGeo()">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-12-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            Usar Geolocalização
        </button>
    </div>

    <div class="footer-note">SÃO PAULO · BRASIL · PAZ PROFUNDA</div>
</div>

<script>
    // MÁSCARA DE CEP
    document.getElementById('cep-input').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g,'');
        if(v.length > 5) v = v.slice(0,5) + '-' + v.slice(5,8);
        e.target.value = v;
    });

    function acessar() {
        const cepRaw = document.getElementById('cep-input').value.replace(/\D/g,'');
        if(cepRaw.length === 8) {
            window.location.href = `zelador.html?cep=${cepRaw}`;
        } else {
            alert("Por favor, digite o CEP completo.");
        }
    }

    function usarGeo() {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    window.location.href = `zelador.html?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`;
                },
                () => alert("Erro ao obter localização. Use o CEP.")
            );
        } else {
            alert("Geolocalização não suportada.");
        }
    }

    document.getElementById('cep-input').addEventListener('keypress', e => {
        if (e.key === 'Enter') acessar();
    });
</script>

</body>
</html>
